<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
</head>

<body>
    <nav>
        <div class="brand">ToolBar</div>
        <div class="menu-icon" [class.active]="menuIconActive" (click)="toggleMenu()">☰</div>
        <ul *ngIf="isMenuVisible">
            <li><a routerLink="" routerLinkActive="active">Home</a></li>
            <li><a routerLink="calculator" routerLinkActive="active">Calculator</a></li>
            <li><a routerLink="currencyconverter" routerLinkActive="active">Currency Converter</a></li>
            <li><a routerLink="findcapital" routerLinkActive="active">Find Capital</a></li>
        </ul>
    </nav>
    <router-outlet></router-outlet>
</body>

</html>
